<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048 Perfect Fit</title>
    <style>
        :root {
            --bg-color: #bbada0;
            --tile-empty: #cdc1b4;
            --text-dark: #776e65;
            --text-light: #f9f6f2;
            --grid-gap: 10px;
            --board-size: 320px;
            /* 1マス = (320 - 10*5) / 4 = 67.5px */
            --tile-size: 67.5px;
        }

        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; background-color: #faf8ef;
            font-family: "Clear Sans", Arial, sans-serif; touch-action: none; overflow: hidden;
        }

        .header { width: var(--board-size); display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .score-container { background: var(--bg-color); padding: 5px 15px; border-radius: 6px; color: white; text-align: center; }

        /* 外枠：ここを基準(relative)に絶対配置(absolute)する */
        #game-board {
            position: relative;
            width: var(--board-size); height: var(--board-size);
            background-color: var(--bg-color); border-radius: 6px; padding: var(--grid-gap); box-sizing: border-box;
        }

        .grid-bg {
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr);
            gap: var(--grid-gap); width: 100%; height: 100%;
        }
        .grid-cell { background-color: var(--tile-empty); border-radius: 3px; }

        .tile {
            position: absolute;
            width: var(--tile-size); height: var(--tile-size);
            border-radius: 3px; display: flex; justify-content: center; align-items: center;
            font-size: 32px; font-weight: bold; color: var(--text-dark);
            /* 位置の変更をアニメーション化 */
            transition: transform 100ms ease-in-out;
            z-index: 10;
            /* 初期位置を固定（JSで上書き） */
            top: 0; left: 0; 
        }

        /* 登場と合体のアニメ */
        .tile-new { animation: appear 150ms ease-out; }
        .tile-merged { animation: pop 150ms ease-in-out; z-index: 20; }

        @keyframes appear { 0% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); } 100% { opacity: 1; transform: translate(var(--tx), var(--ty)) scale(1); } }
        @keyframes pop { 0% { transform: translate(var(--tx), var(--ty)) scale(1); } 50% { transform: translate(var(--tx), var(--ty)) scale(1.15); } 100% { transform: translate(var(--tx), var(--ty)) scale(1); } }

        .tile[data-value="2"] { background: #eee4da; }
        .tile[data-value="4"] { background: #ede0c8; }
        .tile[data-value="8"] { background: #f2b179; color: var(--text-light); }
        .tile[data-value="16"] { background: #f59563; color: var(--text-light); }
        .tile[data-value="32"] { background: #f67c5f; color: var(--text-light); }
        .tile[data-value="64"] { background: #f65e3b; color: var(--text-light); }
        .tile[data-value="128"] { background: #edcf72; color: var(--text-light); font-size: 24px; }
        .tile[data-value="256"] { background: #edcc61; color: var(--text-light); font-size: 24px; }
        .tile[data-value="512"] { background: #edc850; color: var(--text-light); font-size: 24px; }
        .tile[data-value="1024"] { background: #edc53f; color: var(--text-light); font-size: 18px; }
        .tile[data-value="2048"] { background: #edc22e; color: var(--text-light); font-size: 18px; }

        .message { margin-top: 10px; font-weight: bold; color: var(--text-dark); height: 24px; }
        .restart-btn { margin-top: 5px; padding: 10px 20px; background: #8f7a66; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>2048</h1>
        <div class="score-container"><div>SCORE</div><div id="score">0</div></div>
    </div>

    <div id="game-board">
        <div class="grid-bg">
            <script>for(let i=0; i<16; i++) document.write('<div class="grid-cell"></div>');</script>
        </div>
    </div>

    <div id="message" class="message"></div>
    <button class="restart-btn" onclick="initGame()">New Game</button>

    <script>
        const gameBoard = document.getElementById('game-board');
        const scoreEl = document.getElementById('score');
        const msgEl = document.getElementById('message');
        const boardSize = 4;
        const gap = 10;
        const tileSize = 67.5;
        let board = [];
        let score = 0;

        class Tile {
            constructor(r, c, val) {
                this.r = r; this.c = c; this.val = val;
                this.dom = document.createElement('div');
                this.dom.className = 'tile tile-new';
                this.draw();
                gameBoard.appendChild(this.dom);
            }
            draw() {
                const tx = this.c * (tileSize + gap) + gap;
                const ty = this.r * (tileSize + gap) + gap;
                this.dom.innerText = this.val;
                this.dom.setAttribute('data-value', this.val);
                // アニメーション用にCSS変数をセットしつつ、transformを更新
                this.dom.style.setProperty('--tx', `${tx}px`);
                this.dom.style.setProperty('--ty', `${ty}px`);
                this.dom.style.transform = `translate(${tx}px, ${ty}px)`;
            }
            moveTo(r, c) { this.r = r; this.c = c; this.draw(); }
            mergeInto(targetTile) {
                this.moveTo(targetTile.r, targetTile.c);
                this.dom.style.zIndex = 5;
                setTimeout(() => this.dom.remove(), 100);
            }
        }

        function initGame() {
            document.querySelectorAll('.tile').forEach(t => t.remove());
            board = Array(boardSize).fill().map(() => Array(boardSize).fill(null));
            score = 0; scoreEl.innerText = "0"; msgEl.innerText = "";
            addTile(); addTile();
        }

        function addTile() {
            let empty = [];
            for(let r=0; r<boardSize; r++)
                for(let c=0; c<boardSize; c++)
                    if(!board[r][c]) empty.push({r, c});
            if(empty.length) {
                let {r, c} = empty[Math.floor(Math.random() * empty.length)];
                board[r][c] = new Tile(r, c, Math.random() < 0.9 ? 2 : 4);
            }
        }

        function move(dir) {
            let moved = false;
            const vectors = [{r:0, c:-1}, {r:-1, c:0}, {r:0, c:1}, {r:1, c:0}];
            const v = vectors[dir];
            const range = (dir === 2 || dir === 3) ? [3, 2, 1, 0] : [0, 1, 2, 3];

            let mergedPositions = new Set();

            range.forEach(r => {
                range.forEach(c => {
                    let tile = board[r][c];
                    if(!tile) return;

                    let tr = r, tc = c;
                    while(true) {
                        let nr = tr + v.r, nc = tc + v.c;
                        if(nr < 0 || nr >= 4 || nc < 0 || nc >= 4) break;
                        
                        let nt = board[nr][nc];
                        if(!nt) {
                            tr = nr; tc = nc;
                        } else if(nt.val === tile.val && !mergedPositions.has(`${nr},${nc}`)) {
                            // Merge
                            score += tile.val * 2;
                            scoreEl.innerText = score;
                            nt.val *= 2;
                            tile.mergeInto(nt);
                            board[r][c] = null;
                            mergedPositions.add(`${nr},${nc}`);
                            // ポップ効果
                            setTimeout(() => {
                                nt.draw();
                                nt.dom.classList.add('tile-merged');
                                setTimeout(() => nt.dom.classList.remove('tile-merged'), 150);
                            }, 100);
                            moved = true;
                            return;
                        } else break;
                    }

                    if(tr !== r || tc !== c) {
                        board[tr][tc] = tile;
                        board[r][c] = null;
                        tile.moveTo(tr, tc);
                        moved = true;
                    }
                });
            });

            if(moved) setTimeout(() => {
                addTile();
                if(isGameOver()) msgEl.innerText = "Game Over!";
            }, 110);
        }

        function isGameOver() {
            for(let r=0; r<4; r++) for(let c=0; c<4; c++) {
                if(!board[r][c]) return false;
                if(c<3 && board[r][c].val === board[r][c+1]?.val) return false;
                if(r<3 && board[r][c].val === board[r+1][c]?.val) return false;
            }
            return true;
        }

        // --- Controls ---
        window.addEventListener('keydown', e => {
            if(e.key.includes('Arrow')) {
                e.preventDefault();
                move({ArrowLeft:0, ArrowUp:1, ArrowRight:2, ArrowDown:3}[e.key]);
            }
        });

        let sx, sy;
        window.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, {passive:false});
        window.addEventListener('touchend', e => {
            let dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
            if(Math.abs(dx) > 30 || Math.abs(dy) > 30) {
                if(Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 2 : 0);
                else move(dy > 0 ? 3 : 1);
            }
        }, {passive:false});

        initGame();
    </script>
</body>
</html>
